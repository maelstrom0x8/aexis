name: aexis-autonomous-transit
region: nyc
services:
  - name: aexis-api
    instance_count: 1
    instance_size_slug: basic-xxs
    dockerfile_path: aexis/api/Dockerfile
    envs:
      - key: REDIS_HOST
        scope: RUN_TIME
        value: ${aexis-redis.HOSTNAME}
      - key: REDIS_PORT
        scope: RUN_TIME
        value: ${aexis-redis.PORT}
      - key: AI_PROVIDER
        scope: RUN_TIME
        value: gradient
      - key: GRADIENT_ACCESS_TOKEN
        scope: RUN_TIME
        type: SECRET
      - key: GRADIENT_WORKSPACE_ID
        scope: RUN_TIME
        type: SECRET

  - name: aexis-web
    instance_count: 1
    instance_size_slug: basic-xxs
    dockerfile_path: aexis/web/Dockerfile
    http_port: 8000
    routes:
      - path: /
    envs:
      - key: API_URL
        scope: RUN_TIME
        value: ${aexis-api.PUBLIC_URL}

databases:
  - name: aexis-redis
    engine: REDIS
    production: false
    version: "7"
