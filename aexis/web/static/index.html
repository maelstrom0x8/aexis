        <!-- Station Tooltip Overlay -->
        <div id="station-tooltip" class="absolute z-50 pointer-events-none hidden transition-opacity duration-200">
            <div class="bg-gray-900 bg-opacity-95 backdrop-blur-md p-4 rounded-xl border border-gray-700 shadow-2xl w-64 transform -translate-x-1/2 mt-4">
                <div class="flex justify-between items-center mb-3 pb-2 border-b border-gray-700">
                    <h3 id="tooltip-title" class="font-bold text-gray-100 font-mono tracking-tight text-lg">Station</h3>
                    <span id="tooltip-status" class="px-2 py-0.5 rounded text-xs font-semibold uppercase tracking-wider bg-gray-800 border">STATUS</span>
                </div>
                
                <div class="space-y-3">
                    <div class="flex justify-between items-center bg-gray-800 rounded px-3 py-2 border border-gray-700/50">
                        <span class="text-xs text-gray-400 font-medium">Passengers</span>
                        <div class="flex items-center gap-2">
                            <span id="tooltip-pax-count" class="text-sm font-bold text-emerald-400 font-mono">0</span>
                            <span class="text-[10px] text-gray-500 uppercase tracking-wide">waiting</span>
                        </div>
                    </div>
                    
                    <div class="flex justify-between items-center bg-gray-800 rounded px-3 py-2 border border-gray-700/50">
                        <span class="text-xs text-gray-400 font-medium">Cargo</span>
                        <div class="flex items-center gap-2">
                            <span id="tooltip-cargo-count" class="text-sm font-bold text-amber-400 font-mono">0</span>
                            <span class="text-[10px] text-gray-500 uppercase tracking-wide">waiting</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Pod Status Bar -->
        <div id="pod-statusbar" class="absolute bottom-6 left-1/2 transform -translate-x-1/2 z-50 pointer-events-auto hidden transition-all duration-300">
            <div class="bg-gray-900 bg-opacity-90 backdrop-blur-xl p-4 rounded-2xl border flex items-center gap-6 shadow-2xl min-w-[500px]" id="pod-sb-border">
                <div class="flex items-center gap-4 border-r border-gray-700/50 pr-6">
                    <div id="pod-sb-icon" class="w-12 h-12 rounded-xl flex items-center justify-center bg-gray-800 border">
                        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg>
                    </div>
                    <div>
                        <div class="text-[10px] font-bold tracking-widest text-gray-500 uppercase mb-0.5">Selected Pod</div>
                        <div id="pod-sb-id" class="text-lg font-bold text-white font-mono tracking-tight leading-none">POD-000</div>
                    </div>
                </div>

                <div class="flex-1 flex justify-between items-center pr-2">
                    <div class="flex flex-col gap-1">
                        <span class="text-[10px] text-gray-500 uppercase font-bold tracking-wider">Status</span>
                        <span id="pod-sb-status" class="text-sm font-bold font-mono text-gray-300 uppercase">IDLE</span>
                    </div>

                    <div class="w-px h-8 bg-gray-700/50"></div>
                    
                    <div class="flex flex-col gap-1">
                        <span class="text-[10px] text-gray-500 uppercase font-bold tracking-wider">Speed</span>
                        <div class="flex items-baseline gap-1">
                            <span id="pod-sb-speed" class="text-lg font-bold font-mono text-white leading-none">0.0</span>
                            <span class="text-[10px] text-gray-400 font-mono">m/s</span>
                        </div>
                    </div>

                    <div class="w-px h-8 bg-gray-700/50"></div>

                    <div class="flex flex-col gap-1">
                        <span class="text-[10px] text-gray-500 uppercase font-bold tracking-wider">Load</span>
                        <div class="flex items-baseline gap-1">
                            <span id="pod-sb-load" class="text-lg font-bold font-mono text-white leading-none">0</span>
                            <span id="pod-sb-capacity" class="text-xs text-gray-400 font-mono opacity-80">/0</span>
                        </div>
                    </div>
                </div>
                
                <button id="pod-sb-close" class="absolute -top-3 -right-3 w-8 h-8 flex items-center justify-center bg-gray-800 text-gray-400 hover:text-white rounded-full border border-gray-600 shadow-lg transition-colors hover:bg-gray-700">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
        </div>

    </div>
